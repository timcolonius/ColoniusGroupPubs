name: Build and deploy publication site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Build site and update Colonius.tex
        run: python build.py

      - name: Check for duplicate BibTeX keys
        run: |
          python3 -c "
          import re
          with open('colonius.bib') as f:
              content = f.read()
          keys = re.findall(r'@\w+\{(\S+),', content)
          dupes = [k for k in set(keys) if keys.count(k) > 1]
          if dupes:
              print('ERROR: Duplicate keys found:', dupes)
              exit(1)
          print('No duplicate keys found.')
          "

      - name: Compile CV (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Colonius.tex
          latexmk_use_xelatex: false
          args: "-pdf -interaction=nonstopmode -file-line-error"

      - name: Copy CV to docs
        run: cp Colonius.pdf docs/cv.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
